<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DottFont Generator</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== LEFT PANEL — controls sidebar ===================== -->
  <div id="top-panel">

    <!-- ÉTAPE 1 — contenteditable div with DINish -->
    <div class="stage">
      <!-- <span class="step-label">étape 1 — texte</span> -->
      <div class="panel">
        <div id="text-input" contenteditable="true" spellcheck="false">Text</div>
      </div>
    </div>

    <!-- ÉTAPE 2 — bilinear mesh gradient clipped to text shape -->
    <div class="stage" id="stage-gradient">
      <!-- <span class="step-label">étape 2 — gradient</span> -->
      <div id="panel-gradient">
        <canvas id="gradient-canvas"></canvas>
      </div>
    </div>

    <!-- FORME — shape selector -->
    <div id="shape-selector">
      <!-- <span class="step-label">forme</span> -->
      <div class="shape-btns">

        <!-- Circle — clone/circle.svg -->
        <button class="shape-btn active" data-shape="circle" title="Cercle">
          <svg viewBox="0 0 2 2" xmlns="http://www.w3.org/2000/svg">
            <circle cx="1" cy="1" r="1" fill="#000000" />
          </svg>
        </button>

        <!-- Square — clone/pink_square.svg -->
        <button class="shape-btn" data-shape="square" title="Carré">
          <svg viewBox="0 0 2 2" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="2" height="2" fill="#ff00ff" />
          </svg>
        </button>

        <!-- Star — clone/stars.svg -->
        <button class="shape-btn" data-shape="star" title="Étoile">
          <svg viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(-11.617356,-28.396201)">
              <path
                transform="matrix(0.05547957,0,0,0.05547957,10.97283,26.820792)"
                d="M 63.932803,100.12756 43.315212,85.252922 19.373414,93.80454 27.148851,69.599529 11.617356,49.472121 l 25.423076,-0.08488 14.342806,-20.99104 7.936888,24.152552 24.395836,7.154231 -20.517809,15.011979 z"
                fill="#ffff00" />
            </g>
          </svg>
        </button>

        <!-- Dark blue circle — clone/darkblue_circle.svg -->
        <button class="shape-btn" data-shape="darkblue_circle" title="Cercle bleu">
          <svg viewBox="0 0 0.957 0.957" xmlns="http://www.w3.org/2000/svg">
            <circle cx="0.4785" cy="0.4785" r="0.4785" fill="#000080" />
          </svg>
        </button>

      </div>
    </div>

    <!-- TAILLE-GENERATION — dot radius + spacing -->
    <div class="slider-row">
      <label for="taille-generation-slider">Size pregeneration</label>
      <input type="range" id="taille-generation-slider" min="0.25" max="3" step="0.05" value="1" />
      <span id="taille-generation-value">1.00</span>
    </div>

    <!-- TAILLE — dot radius only -->
    <div class="slider-row">
      <label for="size-slider">Size postgeneration</label>
      <input type="range" id="size-slider" min="0.25" max="3" step="0.05" value="1" />
      <span id="size-value">1.00</span>
    </div>

    <!-- PRÉSENCE — probabilistic dot filter -->
    <div class="slider-row">
      <label for="presence-slider">Hazard</label>
      <input type="range" id="presence-slider" min="0" max="1" step="0.01" value="0.5" />
      <span id="presence-value">0.5</span>
    </div>

    <!-- EXPORT -->
    <button id="export-btn">Export to SVG ⬇</button>
    <button id="export-otf-btn">Export to OTF (in progress) ⬇</button>

  </div>

  <!-- ===================== RIGHT PANEL — dot output ===================== -->
  <div id="stage-output">
    <svg id="output" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!--
          Base clone shape — defined as a <symbol> so width/height on <use>
          controls sizing. Updated dynamically when the user selects a shape.
        -->
        <symbol id="base-dot" viewBox="0 0 2 2" preserveAspectRatio="xMidYMid meet">
          <circle cx="1" cy="1" r="1" fill="#000000" />
        </symbol>
      </defs>
    </svg>
  </div>

  <!--
    Hidden canvas — text mask (solid black text on white background).
    Used to determine which pixels belong to the text shape.
  -->
  <canvas id="hidden-canvas" style="display:none;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
  <script src="js/script-generator_DottFont.js"></script>
  <script src="js/export-otf.js"></script>

</body>
</html>
